<!doctype html>
<html lang="zxx">
  <head>
    <meta charset="UTF-8" />
    <meta name="description" content="Yoga Studio Template" />
    <meta name="keywords" content="Yoga, unica, creative, html" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Yummy | Template</title>

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css?family=PT+Sans:400,700&display=swap"
      rel="stylesheet"
    />

    <!-- Css Styles -->
    <link rel="stylesheet" href="css/bulma.min.css" />
    <link rel="stylesheet" href="css/font-awesome.min.css" type="text/css" />
    <link rel="stylesheet" href="css/contactRemake.css" />
    <script src="contact.js" defer></script>
  </head>

  <body>
    <!-- Header -->

    <!-- Header-End -->

    <!-- Hero Search Section Begin -->
    <section
      class="hero is-medium"
      style="
        background: url(&quot;img/search-bg.jpg&quot;) center/cover no-repeat;
      "
    >
      <div class="hero-body">
        <div class="container">
          <form class="columns is-vcentered is-multiline">
            <!-- Search Input -->
            <div class="column is-4">
              <div class="field">
                <div class="control">
                  <input
                    class="input"
                    type="text"
                    placeholder="Search recipe"
                  />
                </div>
              </div>
            </div>

            <!-- Category -->
            <div class="column is-3">
              <div class="field">
                <div class="control">
                  <div class="select is-fullwidth">
                    <select id="category" aria-label="Category">
                      <option value="">Category</option>
                    </select>
                  </div>
                </div>
              </div>
            </div>

            <!-- Tags -->
            <div class="column is-3">
              <div class="field">
                <div class="control">
                  <div class="select is-fullwidth">
                    <select id="tag" aria-label="Tags">
                      <option value="">Tags</option>
                    </select>
                  </div>
                </div>
              </div>
            </div>

            <!-- Button -->
            <div class="column is-2">
              <div class="field">
                <div class="control">
                  <button type="submit" class="button is-fullwidth">
                    Search
                  </button>
                </div>
              </div>
            </div>
          </form>
        </div>
      </div>
    </section>
    <!-- Hero Search Section End -->

    <!-- Contact Section Begin -->

    <section class="section mt-6">
      <div class="container">
        <form class="box" action="#">
          <h3
            class="title is-size-2 is-size-4-mobile has-text-weight-light has-text-centered mb-5"
          >
            Leave a Comment
          </h3>

          <div class="columns is-multiline">
            <!-- Name -->
            <div class="column is-6">
              <div class="field">
                <label class="label">Your name</label>
                <div class="control">
                  <input
                    class="input has-background-grey-lighter"
                    type="text"
                    placeholder="Your name"
                  />
                </div>
              </div>
            </div>

            <!-- Email -->
            <div class="column is-6">
              <div class="field">
                <label class="label">Your email</label>
                <div class="control">
                  <input
                    class="input has-background-grey-lighter"
                    type="email"
                    placeholder="Your email"
                  />
                </div>
              </div>
            </div>

            <!-- Subject -->
            <div class="column is-12">
              <div class="field">
                <label class="label">Subject</label>
                <div class="control">
                  <input
                    class="input has-background-grey-lighter"
                    type="text"
                    placeholder="Subject"
                  />
                </div>
              </div>
            </div>

            <!-- Comment -->
            <div class="column is-12">
              <div class="field">
                <label class="label">Comment</label>
                <div class="control">
                  <textarea
                    class="textarea has-background-grey-lighter"
                    placeholder="Comment"
                  ></textarea>
                </div>
              </div>
            </div>
          </div>

          <div class="has-text-centered mt-4">
            <button
              type="submit"
              class="button has-background-danger has-text-white has-text-weight-bold is-size-5 p-5 px-6"
            >
              Send Message
            </button>
          </div>
        </form>
      </div>
    </section>

    <!-- Contact Section End -->

    <!-- Map Section Begin -->

    <section class="section">
      <div class="container">
        <div class="box p-0" style="position: relative; overflow: hidden">
          <!-- Map -->
          <iframe
            src="https://www.google.com/maps/place/Chinatown,+Los+Angeles,+Californie+90012,+%C3%89tats-Unis/@34.0654546,-118.2340411,15z/data=!4m6!3m5!1s0x80c2c659f50c318d:0xe2ffb80a9d3820ae!8m2!3d34.0616322!4d-118.2363171!16zL20vMDJieDd5?entry=ttu&g_ep=EgoyMDI2MDIxOC4wIKXMDSoASAFQAw%3D%3D"
            width="100%"
            height="550"
            style="border: 0"
            loading="lazy"
            allowfullscreen
          >
          </iframe>

          <!-- Contact Overlay -->
          <div
            class="box custome"
            style="background-image: url(&quot;img/map-bg.png&quot;)"
          >
            <div
              class="customized is-flex is-flex-direction-column is-justify-content-center"
            >
              <p class="title has-text-white is-6 mb-3 has-text-weight-medium">
                Main Road, No 25/11
              </p>

              <span class="is-block has-text-white"> +34 556788 3221 </span>

              <span class="is-block has-text-white">
                contact@foodblog.com
              </span>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Map Section End -->

    <!-- Similar Recipe Section Begin -->

    <section class="section has-background-dark">
      <div class="container">
        <div class="columns is-vcentered is-variable is-6">
          <!-- Item 1 -->
          <div class="column">
            <div class="is-flex is-align-items-center">
              <figure class="image is-96x96 mr-4">
                <img src="img/cat-feature/small-7.jpg" alt="Tiramisu" />
              </figure>

              <div>
                <span class="tag is-danger has-text-weight-bold mb-2"
                  >VEGAN</span
                >
                <h4 class="has-text-white has-text-weight-semibold">
                  Italian Tiramisu with Coffe
                </h4>
              </div>
            </div>
          </div>

          <!-- Item 2 -->
          <div class="column">
            <div class="is-flex is-align-items-center">
              <figure class="image is-96x96 mr-4">
                <img src="img/cat-feature/small-6.jpg" alt="Cookies" />
              </figure>

              <div>
                <span class="tag is-danger has-text-weight-bold mb-2"
                  >VEGAN</span
                >
                <h4 class="has-text-white has-text-weight-semibold">
                  Dry Cookies with Corn
                </h4>
              </div>
            </div>
          </div>

          <!-- Item 3 -->
          <div class="column">
            <div class="is-flex is-align-items-center">
              <figure class="image is-96x96 mr-4">
                <img src="img/cat-feature/small-5.jpg" alt="Pork" />
              </figure>

              <div>
                <span class="tag is-danger has-text-weight-bold mb-2"
                  >VEGAN</span
                >
                <h4 class="has-text-white has-text-weight-semibold">
                  Asparagus with Pork Loin and Vegetables
                </h4>
              </div>
            </div>
          </div>

          <!-- Item 4 -->
          <div class="column">
            <div class="is-flex is-align-items-center">
              <figure class="image is-96x96 mr-4">
                <img src="img/cat-feature/small-4.jpg" alt="Salmon" />
              </figure>

              <div>
                <span class="tag is-danger has-text-weight-bold mb-2"
                  >VEGAN</span
                >
                <h4 class="has-text-white has-text-weight-semibold">
                  Smoked Salmon mini Sandwiches with Onion
                </h4>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Similar Recipe Section End -->
  </body>
</html>
